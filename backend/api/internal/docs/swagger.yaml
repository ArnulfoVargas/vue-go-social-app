basePath: /
info:
  contact: {}
  description: This is a social media API that allows users to create posts, like
    posts, and follow other users.
  title: Social Media API
  version: "0.1"
paths:
  /:
    get:
      description: Returns a simple greeting
      produces:
      - text/plain
      responses:
        "200":
          description: Hello, World!
          schema:
            type: string
      summary: Hello World
      tags:
      - Testing
schemes:
- http
securityDefinitions:
  BearerAuth:
    description: Bearer token authentication
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
